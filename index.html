<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemoryStack AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.13);
      --text: #f0f0f8;
      --muted: #8888aa;
      --accent: #7f77dd;
      --accent2: #534ab7;
      --user-bubble: #2a2560;
      --ai-bubble: #16161f;
      --score-hi: #5dcaa5;
      --score-mid: #ef9f27;
      --score-lo: #888899;
    }

    body.light {
      --bg: #f4f3fb;
      --surface: #ffffff;
      --surface2: #eeedf8;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.14);
      --text: #1a1a2e;
      --muted: #6666aa;
      --accent: #534ab7;
      --accent2: #3c3489;
      --user-bubble: #eeedfe;
      --ai-bubble: #ffffff;
      --score-hi: #0f6e56;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7f77dd, #534ab7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .brand-tag {
      font-size: 11px;
      color: var(--muted);
    }

    .profile-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7f77dd, #1d9e75);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: white;
      flex-shrink: 0;
    }

    .profile-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .profile-status {
      font-size: 11px;
      color: var(--score-hi);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--score-hi);
    }

    #memory-section {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }

    #memory-section::-webkit-scrollbar { width: 3px; }
    #memory-section::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .empty-state {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
      line-height: 1.7;
    }

    .memory-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 11px;
      margin-bottom: 7px;
      transition: border-color 0.2s;
    }

    .memory-item:hover { border-color: var(--border2); }

    .memory-content {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 7px;
    }

    .memory-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
    }

    .memory-tags { display: flex; gap: 3px; flex-wrap: wrap; }

    .tag {
      font-size: 10px;
      color: var(--accent);
      background: rgba(127,119,221,0.12);
      border-radius: 20px;
      padding: 1px 6px;
    }

    .memory-scores { display: flex; gap: 5px; align-items: center; }

    .sim-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 20px;
    }

    .sim-hi { color: #5dcaa5; background: rgba(93,202,165,0.12); }
    .sim-mid { color: #ef9f27; background: rgba(239,159,39,0.12); }
    .sim-lo { color: #888899; background: rgba(136,136,153,0.1); }

    .score-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      background: var(--border);
      padding: 2px 6px;
      border-radius: 20px;
    }

    .ctx-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 4px;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }

    .topbar-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .topbar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    #theme-toggle {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #theme-toggle:hover { background: var(--border2); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .message-row { display: flex; align-items: flex-end; gap: 9px; }
    .message-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    .ai-av { background: linear-gradient(135deg, #7f77dd, #534ab7); color: white; }
    .user-av { background: linear-gradient(135deg, #1d9e75, #0f6e56); color: white; }

    .bubble {
      max-width: 74%;
      padding: 12px 15px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
    }

    .bubble.ai {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(127,119,221,0.25);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }

    .bubble.ai p { margin-bottom: 10px; }
    .bubble.ai p:last-child { margin-bottom: 0; }
    .bubble.ai h1, .bubble.ai h2, .bubble.ai h3 {
      font-size: 14px;
      font-weight: 600;
      margin: 14px 0 6px;
      color: var(--text);
    }
    .bubble.ai h1:first-child, .bubble.ai h2:first-child, .bubble.ai h3:first-child { margin-top: 0; }
    .bubble.ai ul, .bubble.ai ol { padding-left: 18px; margin-bottom: 10px; }
    .bubble.ai li { margin-bottom: 5px; line-height: 1.6; }
    .bubble.ai strong { font-weight: 600; }
    .bubble.ai code {
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 12px;
      background: rgba(127,119,221,0.12);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 15px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    #input-area {
      padding: 14px 22px 18px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 13px;
      padding: 7px 7px 7px 15px;
      align-items: flex-end;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text);
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      font-family: inherit;
      padding: 4px 0;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #send-btn:hover { background: var(--accent2); }
    #send-btn:active { transform: scale(0.94); }
    #send-btn svg { width: 15px; height: 15px; fill: white; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="brand">
      <div class="brand-icon">🧠</div>
      <div>
        <div class="brand-name">MemoryStack AI</div>
        <div class="brand-tag">Semantic memory engine</div>
      </div>
    </div>
    <div class="profile-card">
      <div class="avatar">S</div>
      <div>
        <div class="profile-name">Sandhya</div>
        <div class="profile-status">
          <div class="status-dot"></div>
          Memory active
        </div>
      </div>
    </div>
  </div>

  <div id="memory-section">
    <div id="memory-list">
      <div class="empty-state">Send a message to see retrieved memories and scores.</div>
    </div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <div>
      <div class="topbar-title">Chat</div>
      <div class="topbar-sub">Memories persist across conversations</div>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>
  </div>

  <div id="messages">
    <div class="message-row">
      <div class="msg-avatar ai-av">M</div>
      <div class="bubble ai">Hi! I have semantic memory — I remember what you tell me and use it to give better answers over time. What's on your mind?</div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Type a message..."></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 12L22 2L12 22L10 14L2 12Z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('user-input');
  const messages = document.getElementById('messages');
  const memoryList = document.getElementById('memory-list');

  marked.setOptions({ breaks: true });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function toggleTheme() {
    document.body.classList.toggle('light');
    document.getElementById('theme-toggle').textContent =
      document.body.classList.contains('light') ? '🌙' : '☀️';
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addBubble(text, 'user');
    input.value = '';
    input.style.height = 'auto';

    const typingRow = addTyping();

    try {
      const res = await fetch('http://127.0.0.1:8000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, tags: [] })
      });
      const data = await res.json();
      typingRow.remove();
      addBubble(data.reply, 'ai');
      showMemories(data.memories_used, data.injected_context);
    } catch (err) {
      typingRow.remove();
      addBubble('Could not reach the server. Make sure uvicorn is running.', 'ai');
    }
  }

  function addBubble(text, role) {
    const row = document.createElement('div');
    row.className = 'message-row' + (role === 'user' ? ' user' : '');

    const av = document.createElement('div');
    av.className = 'msg-avatar ' + (role === 'ai' ? 'ai-av' : 'user-av');
    av.textContent = role === 'ai' ? 'M' : 'S';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + role;

    if (role === 'ai') {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    row.appendChild(av);
    row.appendChild(bubble);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'message-row';
    const av = document.createElement('div');
    av.className = 'msg-avatar ai-av';
    av.textContent = 'M';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    row.appendChild(av);
    row.appendChild(bubble);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function simClass(sim) {
    if (sim >= 0.75) return 'sim-hi';
    if (sim >= 0.5) return 'sim-mid';
    return 'sim-lo';
  }

  function showMemories(memories, injectedContext) {
    memoryList.innerHTML = '';

    if (!memories || !memories.length) {
      memoryList.innerHTML = '<div class="empty-state">No memories retrieved above similarity threshold.</div>';
      return;
    }

    const rHeader = document.createElement('div');
    rHeader.className = 'section-label';
    rHeader.textContent = 'Retrieved memories';
    memoryList.appendChild(rHeader);

    memories.forEach(m => {
      const simPercent = Math.round(m.similarity * 100);
      const cls = simClass(m.similarity);
      const tags = (m.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

      const div = document.createElement('div');
      div.className = 'memory-item';
     div.innerHTML = `
      <div class="memory-content">• ${m.content}</div>
      <div class="memory-meta">
        <div class="memory-tags">${tags}</div>
        <div class="memory-scores">
          <span class="sim-badge ${cls}">Sim ${simPercent}%</span>
          <span class="score-badge">score ${m.score}</span>
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:5px;">
        ${m.memory_type.replace('_', '-')} · updated just now
      </div>`;
      memoryList.appendChild(div);
    });

    const ctxHeader = document.createElement('div');
    ctxHeader.className = 'section-label';
    ctxHeader.style.marginTop = '14px';
    ctxHeader.textContent = 'Injected context';
    memoryList.appendChild(ctxHeader);

    const ctxBox = document.createElement('div');
    ctxBox.className = 'ctx-box';
    ctxBox.textContent = injectedContext;
    memoryList.appendChild(ctxBox);
  }
</script>
</body>
</html>
